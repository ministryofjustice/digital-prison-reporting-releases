release:
  project: digital-prison-reporting-jobs
  release_type: gradle
  release_category: backend
  tag: v1.0.152
  bump: 2
  executor:
    name: reporting/java
    tag: 17.0
  s3_sync_args:
    app_dir: ./project
    bucket_prefix: dpr-artifact-store
    src_artifacts_path: build/libs/
    sync_args: '--exclude \"*\" --include \"*-all*jar\"'
    is_gradle_build: true
    deploy_script: true
  extra_args:
    build_gradle_args: -Dorg.gradle.jvmargs=-Xmx4g --max-workers=2
